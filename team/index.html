<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />

  <!-- Mobile-first scaling -->
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <title>Fantasy Team</title>

  <!-- Global PTTP stylesheet -->
  <link rel="stylesheet" href="../css/site.css" />

  <!-- GitHub Pages repo favicon -->
  <link rel="icon" href="/BracketLeaders/favicon.ico">
</head>

<body>

  <!-- Navigation injected by /js/site-chrome.js -->
  <div id="site-nav"></div>

  <main class="container">

    <!-- Static page heading (dynamic roster renders below) -->
    <h1>Fantasy Team Roster</h1>

    <!--
      PRIMARY PAGE RENDER TARGET

      /team/page.js will render the roster here.
      Standardized across pages for consistent:
        • loading states
        • error rendering
        • debugging
    -->
    <div id="page-root"></div>

  </main>

  <div id="site-footer"></div>

  <!-- ===================================================== -->
  <!-- Shared Script Layer                                   -->
  <!-- ===================================================== -->

  <!-- Utility helpers -->
  <script src="../js/utils.js"></script>

  <!-- Navigation chrome renderer -->
  <script src="../js/site-chrome.js"></script>

  <!-- ===================================================== -->
  <!-- Data Layer                                            -->
  <!-- ===================================================== -->

  <!-- Supabase client library -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <!-- PTTP API wrapper (queryView helper) -->
  <script src="../js/api.js"></script>

  <!-- ===================================================== -->
  <!-- Page Controller                                       -->
  <!-- ===================================================== -->

  <!-- Page-specific logic -->
  <script src="./page.js"></script>

</body>
</html>
