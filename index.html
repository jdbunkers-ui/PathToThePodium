<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />

  <!-- Mobile-first layout support -->
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <title>Path to the Podium</title>

  <!-- Global site styling -->
  <link rel="stylesheet" href="./css/site.css" />

  <!-- Repo-relative favicon for GitHub Pages -->
  <link rel="icon" href="/PathToThePodium/favicon.ico" />
</head>

<body>

  <!-- site-chrome.js injects navigation here -->
  <div id="site-nav"></div>

  <main class="container">
    <section class="page-header">
      <h1 class="page-title">Path to the Podium</h1>
      <p class="page-subtitle">
        Browse active fantasy leagues and jump into each scoreboard.
      </p>
    </section>

    <!-- Primary render target -->
    <div id="page-root"></div>
  </main>

  <div id="site-footer"></div>

  <!-- ===================================================== -->
  <!-- Shared Script Layer                                   -->
  <!-- ===================================================== -->

  <!-- Shared utilities (query params, link helpers, etc.) -->
  <script src="./js/utils.js"></script>

  <!-- Shared navigation chrome -->
  <script src="./js/site-chrome.js"></script>

  <!-- ===================================================== -->
  <!-- Data Layer                                            -->
  <!-- ===================================================== -->

  <!-- Supabase client library (must load before api.js) -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <!-- Your Supabase wrapper + queryView() helper -->
  <script src="./js/api.js"></script>

  <!-- ===================================================== -->
  <!-- Page Logic                                            -->
  <!-- ===================================================== -->

  <!-- Root landing page controller -->
  <script src="./page.js"></script>

</body>
</html>
