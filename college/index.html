<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />

  <!-- Mobile-first scaling -->
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <title>College Standings</title>

  <!-- Global PTTP stylesheet -->
  <link rel="stylesheet" href="../css/site.css" />

  <!-- Repo favicon (GitHub Pages path) -->
  <link rel="icon" href="/PathToThePodium/favicon.ico">
</head>

<body>

  <!-- Navigation injected by /js/site-chrome.js -->
  <header id="site-nav"></header>

  <main class="container">

    <!-- Static page heading -->
    <h1>College Standings</h1>

    <!--
      PRIMARY RENDER TARGET

      /college/page.js will render the leaderboard here.
      All pages share this container so:
        • errors render consistently
        • loading states appear here
        • debugging stays simple
    -->
    <div id="page-root"></div>

  </main>

  <footer id="site-footer"></footer>

  <!-- ===================================================== -->
  <!-- Shared Script Layer                                   -->
  <!-- ===================================================== -->

  <!-- Utility helpers (URL params, navigation helpers, etc.) -->
  <script src="../js/utils.js"></script>

  <!-- Navigation chrome renderer -->
  <script src="../js/site-chrome.js"></script>


  <!-- ===================================================== -->
  <!-- Data Layer                                            -->
  <!-- ===================================================== -->

  <!-- Supabase client library -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <!-- PTTP API wrapper (queryView helper) -->
  <script src="../js/api.js"></script>


  <!-- ===================================================== -->
  <!-- Page Controller                                       -->
  <!-- ===================================================== -->

  <!-- Page-specific logic (query + render) -->
  <script src="./page.js"></script>

</body>
</html>
